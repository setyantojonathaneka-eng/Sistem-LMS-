<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - Invest to Your Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />

    <script type="module" src="./components/sidebar.js"></script>
  </head>

  <body class="bg-mainBg h-screen flex overflow-hidden text-gray-800">
    <!-- Sidebar reusable -->
    <app-sidebar></app-sidebar>

    <main class="flex-1 p-8 overflow-y-auto custom-scroll relative">
      <h1 class="text-4xl font-extrabold text-primary mb-6 tracking-wide drop-shadow-sm">DOWNLOAD MATERI</h1>

      <div id="jadwal-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
    </main>

    <script>
      // Data Dummy Jadwal
      const jadwalData = [
        { course: 'Artificial Intelligence Class' },
        { course: 'Digital Marketing Class' },
        { course: 'Artificial Intelligence Class' },
        { course: 'Artificial Intelligence Class' },
        { course: 'Artificial Intelligence Class' },
        { course: 'Artificial Intelligence Class' },
        { course: 'Artificial Intelligence Class' },
        { course: 'Artificial Intelligence Class' },
        { course: 'Artificial Intelligence Class' }
      ]

      // Fungsi untuk me-render kotak jadwal
      const container = document.getElementById('jadwal-container')

      // Render HTML dengan layout baru
      const cardsHTML = jadwalData
        .map(
          (item) => `
        <div class="bg-primary rounded-[2rem] flex flex-col justify-between items-center p-8 h-56 shadow-md hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
          
          <h2 class="text-white text-2xl font-bold text-center tracking-wide mt-2">
            ${item.course}
          </h2>
          
          <a href="show-materi-download.html" class="w-full bg-[#F0EAE4] hover:bg-white text-primary font-extrabold text-sm text-center py-3.5 rounded-full transition-colors shadow-sm">
            <span class="underline decoration-2 underline-offset-4">Download materi disini</span>
          </a>

        </div>
      `
        )
        .join('')

      container.innerHTML = cardsHTML
    </script>
  </body>
</html>
